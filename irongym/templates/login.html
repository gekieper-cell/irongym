<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Iron Gym — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#c0392b;--gold:#f39c12;--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--border:#2a2a2a;--text:#e8e8e8;--text2:#aaa;--text3:#666}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0a 0%,#1a0505 50%,#0a0a0a 100%)}
.wrap{width:100%;max-width:380px;padding:20px}
.logo{text-align:center;margin-bottom:40px}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:90px;letter-spacing:8px;line-height:1;text-shadow:0 0 60px rgba(192,57,43,.4)}
.logo-sub{font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:12px;color:var(--red);text-transform:uppercase;margin-top:-8px}
.box{background:var(--bg2);border:1px solid #333;padding:36px;position:relative}
.box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--gold),var(--red))}
.box h2{font-family:'Barlow Condensed',sans-serif;font-size:18px;letter-spacing:4px;text-transform:uppercase;color:var(--text2);text-align:center;margin-bottom:28px}
.fg{margin-bottom:18px}
.fg label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;font-family:'Barlow Condensed',sans-serif}
.fg input{width:100%;background:#1a1a1a;border:1px solid #333;color:var(--text);padding:11px 14px;font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.fg input:focus{border-color:var(--red)}
.btn{width:100%;padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:3px;text-transform:uppercase;background:var(--red);color:#fff;border:none;cursor:pointer;transition:background .2s;font-weight:700}
.btn:hover{background:#e74c3c}
.err{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.4);color:#e74c3c;padding:10px 14px;font-size:13px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;margin-top:12px;display:none}
.forgot{text-align:center;margin-top:16px}
.forgot a{color:var(--text3);font-size:13px;cursor:pointer;text-decoration:none}
.forgot a:hover{color:var(--red)}
/* recover modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid #333;width:100%;max-width:380px;padding:28px;position:relative}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;margin-bottom:20px}
.modal .close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer}
.modal .close:hover{color:var(--red)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid #333;margin-top:8px}
.btn-outline:hover{border-color:var(--red);color:var(--red)}
.step{display:none}.step.active{display:block}
.ok{background:rgba(39,174,96,.15);border:1px solid rgba(39,174,96,.4);color:#2ecc71;padding:10px 14px;font-size:13px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;margin-bottom:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-main" id="loginNombre">IRON GYM</div>
    <div class="logo-sub">Boxing Management System</div>
  </div>
  <div class="box">
    <h2>Acceso al Sistema</h2>
    <div class="fg"><label>Usuario</label><input id="usr" type="text" placeholder="admin / operador" autocomplete="off"></div>
    <div class="fg"><label>Contraseña</label><input id="pw" type="password" placeholder="••••••••"></div>
    <div class="err" id="err"></div>
    <button class="btn" id="btnLogin" onclick="doLogin()">INGRESAR</button>
    <div class="forgot"><a onclick="openRecover()">¿Olvidaste la contraseña de administrador?</a></div>
  </div>
</div>

<!-- RECOVER MODAL -->
<div class="overlay" id="recoverOverlay">
  <div class="modal">
    <button class="close" onclick="closeRecover()">✕</button>
    <h3>RECUPERAR CLAVE</h3>
    <div class="step active" id="rs1">
      <p style="color:var(--text2);font-size:14px;margin-bottom:16px">Ingresá la clave maestra del sistema.</p>
      <div class="fg"><label>Clave Maestra</label><input id="masterKey" type="password" placeholder="Clave maestra"></div>
      <div class="err" id="masterErr"></div>
      <button class="btn" onclick="verifyMaster()">VERIFICAR</button>
    </div>
    <div class="step" id="rs2">
      <div class="ok">✓ Clave maestra correcta. Podés cambiar la contraseña.</div>
      <div class="fg"><label>Nueva Contraseña</label><input id="np1" type="password" placeholder="Nueva contraseña"></div>
      <div class="fg"><label>Confirmar</label><input id="np2" type="password" placeholder="Repetir contraseña"></div>
      <div class="err" id="passErr"></div>
      <button class="btn" onclick="savePass()">GUARDAR NUEVA CLAVE</button>
    </div>
  </div>
</div>

<script>
// Load gym name on login page
fetch('/api/version').then(r=>r.json()).then(v=>{
  if(v.gym_nombre) document.getElementById('loginNombre').textContent=v.gym_nombre.toUpperCase();
  if(v.is_test){
    document.body.style.background='linear-gradient(135deg,#0a0a0a 0%,#1a1200 50%,#0a0a0a 100%)';
    const banner=document.createElement('div');
    banner.style='position:fixed;top:0;left:0;right:0;background:#f39c12;color:#000;text-align:center;padding:6px;font-family:monospace;font-size:13px;font-weight:bold;z-index:999';
    banner.textContent='⚠ ENTORNO DE TEST';
    document.body.prepend(banner);
  }
}).catch(()=>{});

document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('usr').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin() {
  const u=document.getElementById('usr').value.trim();
  const p=document.getElementById('pw').value;
  const err=document.getElementById('err');
  err.style.display='none';
  const btn=document.getElementById('btnLogin');
  btn.textContent='...'; btn.disabled=true;
  try {
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario:u,password:p})});
    const d=await r.json();
    if(d.ok){ window.location='/'; }
    else { err.textContent=d.msg||'Error de acceso'; err.style.display='block'; }
  } catch(e){ err.textContent='Error de conexión'; err.style.display='block'; }
  btn.textContent='INGRESAR'; btn.disabled=false;
}

function openRecover(){ document.getElementById('recoverOverlay').classList.add('open'); }
function closeRecover(){ document.getElementById('recoverOverlay').classList.remove('open'); }

async function verifyMaster(){
  const key=document.getElementById('masterKey').value;
  const err=document.getElementById('masterErr');
  const r=await fetch('/api/recover/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({master_key:key})});
  const d=await r.json();
  if(d.ok){ document.getElementById('rs1').classList.remove('active'); document.getElementById('rs2').classList.add('active'); }
  else { err.textContent=d.msg||'Clave incorrecta'; err.style.display='block'; }
}

async function savePass(){
  const p1=document.getElementById('np1').value;
  const p2=document.getElementById('np2').value;
  const err=document.getElementById('passErr');
  if(!p1||p1!==p2){ err.textContent='Las contraseñas no coinciden'; err.style.display='block'; return; }
  const r=await fetch('/api/recover/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pass1:p1,pass2:p2})});
  const d=await r.json();
  if(d.ok){ closeRecover(); alert('Contraseña actualizada correctamente.'); }
  else { err.textContent=d.msg||'Error'; err.style.display='block'; }
}
</script>
</body>
</html>
